name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    name: Type-check & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit --project tsconfig.app.json

      - name: ESLint
        run: npx eslint src --max-warnings=0
